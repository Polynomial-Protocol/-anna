name: Anna
options:
  bundleIdPrefix: com.polynomial
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.polynomial.anna
    PRODUCT_NAME: Anna
    SWIFT_VERSION: 5.10
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_ENTITLEMENTS: Anna.entitlements
    ENABLE_HARDENED_RUNTIME: YES
packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: "0.7.9"
targets:
  Anna:
    type: application
    platform: macOS
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Anna
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.utilities
        NSMicrophoneUsageDescription: Anna listens while you hold Right Command to transcribe voice commands, and while you hold Right Option to dictate text into any app.
        NSAppleEventsUsageDescription: Anna controls apps like Safari, Music, and Finder on your behalf when you ask it to perform actions that require automation.
        NSSpeechRecognitionUsageDescription: Anna uses on-device speech recognition to transcribe your voice commands and dictation privately on your Mac.
        NSScreenCaptureUsageDescription: Anna captures your screen so it can see what you're looking at and give you visual guidance, like pointing to buttons or menu items.
        NSRemindersFullAccessUsageDescription: Anna creates reminders and alarms for you when you ask, like "set an alarm for 7am" or "remind me to call Mom."
        NSCalendarsFullAccessUsageDescription: Anna creates and reads calendar events when you ask, like "add a meeting at 3pm" or "what's on my schedule today."
        NSContactsUsageDescription: Anna looks up contacts when you ask, like "call Mom" or "text John."
        NSFocusStatusUsageDescription: Anna checks your Focus status so it knows when not to interrupt you.
    sources:
      - App
      - Core
      - Domain
      - Features
      - Infrastructure
      - Models
      - UIComponents
      - path: Resources/Assets.xcassets
      - path: Resources/piper
        buildPhase: resources
        type: folder
    settings:
      base:
        PRODUCT_NAME: Anna
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_SANDBOX: NO
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ARCHS: arm64
        ONLY_ACTIVE_ARCH: NO
